name: ci-cd

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # OIDC to AWS/Azure — no long-lived keys
  pull-requests: write
  security-events: write

# Active deployment target: repo variable CLOUD_PROVIDER (aws | azure).
# BOTH iac roots are always validated; plan/apply/deploy target the
# selected provider's root. See docs/cloud-portability.md.
env:
  AWS_REGION: us-east-1
  CLOUD_PROVIDER: ${{ vars.CLOUD_PROVIDER || 'aws' }}

jobs:
  go-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alerting
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: alerting/go.mod
      - name: Lint
        run: |
          test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
          go vet ./...
      - name: Test
        run: go test -race -cover ./...

  python-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint
        run: |
          pip install ruff
          ruff check .
          ruff format --check .
      - name: Test
        run: python -m unittest discover -s tests -v

  terraform-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        provider: [aws, azure]
    defaults:
      run:
        working-directory: iac/${{ matrix.provider }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format
        run: terraform fmt -check -recursive
      - name: Validate
        run: |
          terraform init -backend=false
          terraform validate
      - name: IaC security scan (Trivy)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: config
          scan-ref: iac/${{ matrix.provider }}
          exit-code: "1"
          severity: HIGH,CRITICAL

  terraform-plan:
    if: github.event_name == 'pull_request'
    needs: [terraform-checks]
    runs-on: ubuntu-latest
    environment: plan
    steps:
      - uses: actions/checkout@v4
      - name: AWS credentials
        if: env.CLOUD_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Azure login
        if: env.CLOUD_PROVIDER == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
      - name: Materialize AWS dev tfvars
        if: env.CLOUD_PROVIDER == 'aws'
        run: printf '%s\n' "$TF_AWS_DEV_TFVARS" > iac/aws/envs/dev.tfvars
        env:
          TF_AWS_DEV_TFVARS: ${{ secrets.TF_AWS_DEV_TFVARS }}
      - name: Plan
        working-directory: iac/${{ env.CLOUD_PROVIDER }}
        run: |
          terraform init
          terraform plan -no-color -out=tfplan \
            -var-file=envs/${{ vars.TF_ENV || 'dev' }}.tfvars \
            -var="image_tag=${{ github.sha }}" | tee plan.txt
      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const provider = process.env.CLOUD_PROVIDER;
            const plan = fs.readFileSync(`iac/${provider}/plan.txt`, 'utf8').slice(0, 60000);
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `### Terraform plan (${provider})\n\`\`\`\n` + plan + '\n```',
            });

  terraform-apply:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [go-checks, python-checks, terraform-checks]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: AWS credentials
        if: env.CLOUD_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Azure login
        if: env.CLOUD_PROVIDER == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
      - name: Materialize AWS dev tfvars
        if: env.CLOUD_PROVIDER == 'aws'
        run: printf '%s\n' "$TF_AWS_DEV_TFVARS" > iac/aws/envs/dev.tfvars
        env:
          TF_AWS_DEV_TFVARS: ${{ secrets.TF_AWS_DEV_TFVARS }}
      - name: Apply
        working-directory: iac/${{ env.CLOUD_PROVIDER }}
        run: |
          terraform init
          terraform apply -auto-approve \
            -var-file=envs/${{ vars.TF_ENV || 'dev' }}.tfvars \
            -var="image_tag=${{ github.sha }}"

  deploy-services:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [terraform-apply]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        service: [miner, alerting]
    steps:
      - uses: actions/checkout@v4

      # --- AWS deploy path -------------------------------------------------
      - name: AWS credentials
        if: env.CLOUD_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        if: env.CLOUD_PROVIDER == 'aws'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push image (ECR)
        if: env.CLOUD_PROVIDER == 'aws'
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/autorater-${{ matrix.service }}:${{ github.sha }}"
          docker build -t "$IMAGE" ${{ matrix.service }}
          docker push "$IMAGE"
      - name: Roll alerting service
        if: env.CLOUD_PROVIDER == 'aws' && matrix.service == 'alerting'
        run: |
          aws ecs update-service \
            --cluster autorater-prod \
            --service alerting \
            --force-new-deployment
        # The miner needs no rollout: EventBridge launches the freshly pushed
        # task definition image on its next scheduled sweep.

      # --- Azure deploy path -----------------------------------------------
      - name: Azure login
        if: env.CLOUD_PROVIDER == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build and push image (ACR)
        if: env.CLOUD_PROVIDER == 'azure'
        run: |
          RG=autorater-${{ vars.TF_ENV || 'dev' }}
          ACR=$(az acr list -g "$RG" --query "[0].loginServer" -o tsv)
          az acr login --name "$ACR"
          IMAGE="$ACR/autorater-${{ matrix.service }}:${{ github.sha }}"
          docker build -t "$IMAGE" ${{ matrix.service }}
          docker push "$IMAGE"
      - name: Roll alerting Container App
        if: env.CLOUD_PROVIDER == 'azure' && matrix.service == 'alerting'
        run: |
          RG=autorater-${{ vars.TF_ENV || 'dev' }}
          ACR=$(az acr list -g "$RG" --query "[0].loginServer" -o tsv)
          az containerapp update --name alerting --resource-group "$RG" \
            --image "$ACR/autorater-alerting:${{ github.sha }}"
        # The miner needs no rollout: its Container Apps Job picks up the
        # freshly pushed image on its next cron-triggered execution.
